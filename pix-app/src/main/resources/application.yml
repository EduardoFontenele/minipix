springdoc:
  swagger-ui:
    url: /openapi.yaml

spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5433/minipix
    username: minipix
    password: minipix
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: http://localhost:8082

pix:
  security:
    jwt-secret: minipix-secret-key-for-local-dev
  idempotency:
    ttl-hours: 24
  kafka:
    topic:
      transactions: pix.transactions
